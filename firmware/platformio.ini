# Target: M5Stack Timer Camera F (U082-F)
# ESP32, 4 MB Flash, 8 MB PSRAM, OV3660 fisheye lens
[env:m5stack-timer-cam-f]
platform      = espressif32
board         = esp32dev          ; closest generic match — Timer Camera F is ESP32
framework     = arduino

board_build.partitions = huge_app.csv

; Camera and PSRAM support
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    ; BNO055 IMU
    adafruit/Adafruit BNO055 @ ^1.6.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; JSON serialization
    bblanchon/ArduinoJson @ ^7.0.0

monitor_speed = 115200
upload_speed  = 921600
